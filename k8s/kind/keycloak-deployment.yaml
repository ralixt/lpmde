apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: lpmde-sandbox
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:25.0
          args:
            - start-dev
            - --http-enabled=true
            - --hostname-strict=false
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: management
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: lpmde-sandbox-secrets
                  key: keycloak-admin-user
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lpmde-sandbox-secrets
                  key: keycloak-admin-password
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_HTTP_MANAGEMENT_HEALTH_ENABLED
              value: "true"
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: postgres
            - name: KC_DB_URL_PORT
              value: "5432"
            - name: KC_DB_URL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: lpmde-sandbox-secrets
                  key: keycloak-db-name
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: lpmde-sandbox-secrets
                  key: keycloak-db-user
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lpmde-sandbox-secrets
                  key: keycloak-db-password
          resources:
            requests:
              memory: "768Mi"
              cpu: "500m"
            limits:
              memory: "1200Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /health/started
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
      - rag
  pull_request:
    branches:
      - main
      - master
      - develop
      - rag

env:
  DOCKER_DRIVER: overlay2

jobs:
  # ═══════════════════════════════════════
  # STAGE 1 : INSTALL
  # ═══════════════════════════════════════
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, intl
          tools: composer
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-ansi --no-interaction --no-progress --optimize-autoloader

      - name: Upload vendor artifact
        uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor/
          retention-days: 1

  # ═══════════════════════════════════════
  # STAGE 2 : TESTS (5 jobs en parallèle)
  # ═══════════════════════════════════════
  unit-test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, intl
          coverage: xdebug

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Create log directory
        run: mkdir -p var/log

      - name: Run unit tests
        run: php bin/phpunit --testsuite=unit --coverage-clover=coverage.xml --log-junit=junit-unit.xml
        env:
          APP_ENV: test

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            coverage.xml
            junit-unit.xml
        continue-on-error: true

  e2e-test-job:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, intl

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Run functional tests
        run: php bin/phpunit --testsuite=functional --no-coverage
        env:
          APP_ENV: test

  npm-build:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build CSS (Tailwind)
        run: npm run build

      - name: Upload built CSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-css
          path: public/css/app.css
          retention-days: 1

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  sonar-audit:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  trivy-fs-audit:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
        continue-on-error: true

  # ═══════════════════════════════════════
  # STAGE 3 : RELEASE (build Docker + push GHCR)
  # ═══════════════════════════════════════
  build-image-job:
    runs-on: ubuntu-latest
    needs: [unit-test, e2e-test-job, npm-build, trivy-fs-audit]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════
  # STAGE 4 : STAGING (déploiement)
  # ═══════════════════════════════════════
  deploy-staging-job:
    runs-on: ubuntu-latest
    needs: build-image-job
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Deploy to staging
        run: |
          echo "🚀 Déploiement staging"
          echo "Image: ghcr.io/${{ github.repository }}:latest"
          echo "Note: Le déploiement réel nécessite la configuration des secrets SSH"
          # ssh user@server "docker pull ghcr.io/... && docker-compose up -d"

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-image-job
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://production.example.com
    steps:
      - name: Deploy to production
        run: |
          echo "🚀 Déploiement production"
          echo "Image: ghcr.io/${{ github.repository }}:latest"
          echo "Note: Le déploiement réel nécessite la configuration des secrets SSH"
          # ssh user@server "docker pull ghcr.io/... && docker-compose up -d"

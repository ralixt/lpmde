name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
      - rag
  pull_request:
    branches:
      - main
      - master
      - develop
      - rag

env:
  DOCKER_DRIVER: overlay2

jobs:
  # ═══════════════════════════════════════
  # STAGE 1 : INSTALL
  # ═══════════════════════════════════════
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, intl
          tools: composer
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-ansi --no-interaction --no-progress --optimize-autoloader

      - name: Upload vendor artifact
        uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor/
          retention-days: 1

  # ═══════════════════════════════════════
  # STAGE 2 : TESTS (5 jobs en parallèle)
  # ═══════════════════════════════════════
  unit-test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, intl
          coverage: xdebug

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Create log directory
        run: mkdir -p var/log

      - name: Run unit tests
        run: php bin/phpunit --testsuite=unit --coverage-clover=coverage.xml --log-junit=junit-unit.xml
        env:
          APP_ENV: test

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            coverage.xml
            junit-unit.xml
        continue-on-error: true

  e2e-test-job:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, intl

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Create required directories
        run: mkdir -p var/log var/cache

      - name: Run functional tests
        run: php bin/phpunit --testsuite=functional --no-coverage
        env:
          APP_ENV: test
          MESSENGER_TRANSPORT_DSN: "in-memory://"

      - name: Run E2E tests
        run: php bin/phpunit --testsuite=e2e --no-coverage
        env:
          APP_ENV: test
          MESSENGER_TRANSPORT_DSN: "in-memory://"

  npm-build:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build CSS (Tailwind)
        run: npm run build

      - name: Upload built CSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-css
          path: public/css/app.css
          retention-days: 1

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  sonar-audit:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .

      - name: Verify coverage file
        run: |
          ls -la coverage.xml junit-unit.xml || echo "Coverage files missing!"
          wc -l coverage.xml || echo "coverage.xml is empty or missing"

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  trivy-fs-audit:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
        continue-on-error: true

  # ═══════════════════════════════════════
  # STAGE 2.5 : PUSH MÉTRIQUES CI → GRAFANA
  # ═══════════════════════════════════════
  push-metrics-job:
    runs-on: self-hosted
    needs: unit-test
    if: always()
    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: ./ci-artifacts

      - name: Parse and push metrics to Pushgateway
        shell: powershell
        run: |
          # Parse JUnit XML
          [xml]$junit = Get-Content ./ci-artifacts/junit-unit.xml
          $suite    = $junit.testsuites.testsuite
          $total    = [int]$suite.tests
          $failures = [int]$suite.failures
          $errors   = [int]$suite.errors
          $skipped  = [int]$suite.skipped
          $passed   = $total - $failures - $errors - $skipped

          # Parse coverage XML (Clover)
          [xml]$cov   = Get-Content ./ci-artifacts/coverage.xml
          $metrics    = $cov.coverage.project.metrics
          $covTotal   = [int]$metrics.statements
          $covCovered = [int]$metrics.coveredstatements
          $covPct     = if ($covTotal -gt 0) { [math]::Round($covCovered / $covTotal * 100, 2) } else { 0 }

          # Build/push status
          $branch = "${{ github.ref_name }}"
          $status = if ($failures -eq 0 -and $errors -eq 0) { 1 } else { 0 }

          $failed = $failures + $errors
          $lines = @(
            "ci_tests_passed{branch=`"$branch`"} $passed",
            "ci_tests_failed{branch=`"$branch`"} $failed",
            "ci_tests_skipped{branch=`"$branch`"} $skipped",
            "ci_coverage_percent{branch=`"$branch`"} $covPct",
            "ci_build_success{branch=`"$branch`"} $status"
          )
          $body = ($lines -join "`n") + "`n"
          Invoke-RestMethod -Uri "http://localhost:9091/metrics/job/github_ci/branch/$branch" `
            -Method Post -Body $body -ContentType "text/plain"
          Write-Host "Metrics pushed: passed=$passed failed=$failed coverage=$covPct% build=$status"

      - name: Cleanup artifacts
        if: always()
        shell: powershell
        run: Remove-Item -Recurse -Force ./ci-artifacts -ErrorAction SilentlyContinue

  # ═══════════════════════════════════════
  # STAGE 3 : RELEASE (build Docker + push GHCR)
  # ═══════════════════════════════════════
  build-image-job:
    runs-on: ubuntu-latest
    needs: [unit-test, e2e-test-job, npm-build, trivy-fs-audit]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/rag'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════
  # STAGE 4 : STAGING (déploiement)
  # ═══════════════════════════════════════
  deploy-staging-job:
    runs-on: self-hosted
    needs: build-image-job
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/rag'
    environment:
      name: staging
      url: http://localhost:8000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Kind cluster
        run: |
          Write-Host "Verification du cluster Kind..."
          kubectl config use-context kind-lpmde-sandbox
          kubectl get nodes
          kubectl get pods -n lpmde-sandbox
        shell: powershell

      - name: Pull latest image from GHCR
        run: |
          Write-Host "Pull de l'image depuis GHCR..."
          docker pull ghcr.io/${{ github.repository }}:latest
          if ($LASTEXITCODE -ne 0) { Write-Host "Pull failed, using local image" }
        shell: powershell

      - name: Load image into Kind
        run: |
          Write-Host "Chargement de l'image dans Kind..."
          kind load docker-image ghcr.io/${{ github.repository }}:latest --name lpmde-sandbox
          if ($LASTEXITCODE -ne 0) { Write-Host "Kind load failed, continuing..." }
        shell: powershell

      - name: Deploy to Kind cluster
        run: |
          Write-Host "Deploiement sur Kind..."
          kubectl apply -k k8s/kind/ -n lpmde-sandbox
          Write-Host "Attente des pods..."
          kubectl wait --for=condition=Available deployment/postgres -n lpmde-sandbox --timeout=120s
          kubectl wait --for=condition=Available deployment/rabbitmq -n lpmde-sandbox --timeout=120s
          kubectl wait --for=condition=Available deployment/keycloak -n lpmde-sandbox --timeout=300s
          kubectl wait --for=condition=Available deployment/lpmde-web -n lpmde-sandbox --timeout=180s
          Write-Host "Etat du deploiement :"
          kubectl get pods -n lpmde-sandbox
          kubectl get svc -n lpmde-sandbox
        shell: powershell

      - name: Run smoke test
        run: |
          Write-Host "Smoke test post-deploiement..."
          $pods = kubectl get pods -n lpmde-sandbox --no-headers
          $running = ($pods | Select-String "Running").Count
          $total = $pods.Count
          Write-Host "Pods Running: $running / $total"
          if ($running -lt 4) {
            Write-Host "Moins de 4 pods Running - verifier les logs"
            kubectl get pods -n lpmde-sandbox
            exit 1
          }
          Write-Host "Smoke test passe - tous les services sont operationnels"
        shell: powershell

  deploy-production:
    runs-on: self-hosted
    needs: build-image-job
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: http://localhost:8000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Kind (production)
        run: |
          Write-Host "Deploiement production sur Kind..."
          kubectl config use-context kind-lpmde-sandbox
          kubectl apply -k k8s/kind/ -n lpmde-sandbox
          kubectl get pods -n lpmde-sandbox
          Write-Host "Deploiement production termine"
        shell: powershell

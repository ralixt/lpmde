global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # App Symfony — disponibilité HTTP
  - job_name: 'symfony-app'
    metrics_path: '/'
    scheme: http
    static_configs:
      - targets: ['host.docker.internal:8000']
    scrape_interval: 30s

  # Métriques RabbitMQ via l'exporter
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq-exporter:9419']
    scrape_interval: 15s

stages:
  - install
  - test
  - release
  - staging
  - production

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# Stage Install
install:
  stage: install
  image: composer:latest
  script:
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts --optimize-autoloader
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  artifacts:
    paths:
      - vendor/
    expire_in: 1 hour
  only:
    - branches

# Stage Test
sast-npm-audit:
  stage: test
  image: node:18
  script:
    - npm audit --audit-level=moderate || true
  allow_failure: true
  only:
    - branches

sonar-audit:
  stage: test
  image: sonarsource/sonar-scanner-cli:latest
  dependencies:
    - unit-test
  script:
    - |
      if [ -z "${SONAR_HOST_URL}" ]; then
        echo "SONAR_HOST_URL not configured, skipping SonarQube analysis"
        exit 0
      fi
    - sonar-scanner
      -Dsonar.projectKey=${CI_PROJECT_NAME}
      -Dsonar.sources=src
      -Dsonar.host.url=${SONAR_HOST_URL}
      -Dsonar.login=${SONAR_TOKEN}
      -Dsonar.php.coverage.reportPaths=var/log/cobertura.xml
  allow_failure: true
  only:
    - branches

trivy-fs-audit:
  stage: test
  image: 
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs --severity HIGH,CRITICAL --exit-code 0 --scanners vuln .
  allow_failure: true
  only:
    - branches

unit-test:
  stage: test
  image: php:8.2-cli
  dependencies:
    - install
  before_script:
    - apt-get update && apt-get install -y git zip unzip
    - docker-php-ext-install pdo pdo_mysql
    - pecl install pcov && docker-php-ext-enable pcov
    - mkdir -p var/log
  script:
    - XDEBUG_MODE=coverage php bin/phpunit --coverage-cobertura=var/log/cobertura.xml --log-junit=var/log/junit.xml
  coverage: '/^\s*Lines:\s*\d+.\d+\%/'
  artifacts:
    reports:
      junit: var/log/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: var/log/cobertura.xml
  only:
    - branches

e2e-test-job:
  stage: test
  image: php:8.2-cli
  dependencies:
    - install
  before_script:
    - apt-get update && apt-get install -y git zip unzip
    - docker-php-ext-install pdo pdo_mysql
  script:
  - echo "Running E2E tests"
  - php bin/phpunit -c phpunit.xml.dist --testsuite=e2e --no-coverage

  allow_failure: false
  only:
    - branches

# Stage Release
build-image-job:
  stage: release
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - master
    - develop

# Stage Staging
deploy-staging-job:
  stage: staging
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $STAGING_SERVER >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to staging environment"
    - ssh $STAGING_USER@$STAGING_SERVER "
        cd $STAGING_PATH &&
        docker pull $CI_REGISTRY_IMAGE:latest &&
        docker-compose down &&
        docker-compose up -d
      "
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - develop
  when: manual

# Stage Production
deploy-production-job:
  stage: production
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $PRODUCTION_SERVER >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to production environment"
    - ssh $PRODUCTION_USER@$PRODUCTION_SERVER "
        cd $PRODUCTION_PATH &&
        docker pull $CI_REGISTRY_IMAGE:latest &&
        docker-compose down &&
        docker-compose up -d
      "
  environment:
    name: production
    url: https://production.example.com
  only:
    - main
    - master
  when: manual

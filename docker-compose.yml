version: '3.8'

services:
  web:
    image: ${CI_REGISTRY_IMAGE:-lpmde}:${IMAGE_TAG:-latest}
    container_name: lpmde-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./var/log:/var/www/html/var/log
    networks:
      - lpmde-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: lpmde-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lpmde}
      MYSQL_USER: ${MYSQL_USER:-lpmde}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lpmde}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - lpmde-network
    ports:
      - "${DB_PORT:-3306}:3306"

networks:
  lpmde-network:
    driver: bridge

volumes:
  db-data:
